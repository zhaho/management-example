apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-finance-admin
  namespace: team-finance
  labels:
    team: team-finance
    environment: staging
subjects:
  - kind: Group
    name: team-finance-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
