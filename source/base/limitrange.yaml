apiVersion: v1
kind: LimitRange
metadata:
  name: ${TEAM_NAME}-limits
  namespace: ${NAMESPACE}
  labels:
    team: ${TEAM_NAME}
    environment: ${ENVIRONMENT}
spec:
  limits:
    - type: Container
      default:
        cpu: ${CPU_LIMIT}
        memory: ${MEMORY_LIMIT}
      defaultRequest:
        cpu: ${CPU_REQUEST}
        memory: ${MEMORY_REQUEST}
