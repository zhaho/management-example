# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  SOURCE_DIR: source
  DEPLOY_DIR: deploy

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmds:
      - task --list

  # ─── Generate all teams ───────────────────────────────────────────────────

  generate:
    desc: "Generate K8s resource files for all teams. FORMAT=yaml (default) | FORMAT=json"
    vars:
      FMT: '{{default "yaml" .FORMAT}}'
    cmds:
      - ./scripts/generate-all.sh "{{.SOURCE_DIR}}" "{{.FMT}}"

  generate:yaml:
    desc: "Generate YAML files for all teams"
    cmds:
      - task: generate
        vars:
          FORMAT: yaml

  generate:json:
    desc: "Generate JSON files for all teams"
    cmds:
      - task: generate
        vars:
          FORMAT: json

  # ─── Generate a single team ───────────────────────────────────────────────

  generate:team:
    desc: "Generate files for one team. Required: TEAM=<name>  Optional: FORMAT=yaml|json"
    vars:
      FMT: '{{default "yaml" .FORMAT}}'
    requires:
      vars: [TEAM]
    cmds:
      - ./scripts/generate-team.sh "{{.SOURCE_DIR}}" "{{.DEPLOY_DIR}}" "{{.TEAM}}" "{{.FMT}}"

  # ─── Team management helpers ──────────────────────────────────────────────

  list-teams:
    desc: "List all available team configurations"
    silent: true
    cmds:
      - ./scripts/list-teams.sh "{{.SOURCE_DIR}}"

  new-team:
    desc: "Scaffold a new team config. Required: TEAM=<name>  Optional: NAMESPACE=<ns> ENVIRONMENT=<env>"
    vars:
      NS: '{{default .TEAM .NAMESPACE}}'
      ENV: '{{default "production" .ENVIRONMENT}}'
    requires:
      vars: [TEAM]
    cmds:
      - ./scripts/new-team.sh "{{.SOURCE_DIR}}" "{{.TEAM}}" "{{.NS}}" "{{.ENV}}"

  # ─── Cleanup ──────────────────────────────────────────────────────────────

  clean:
    desc: "Remove all generated files from the deploy directory"
    prompt: "This will delete all generated files in {{.DEPLOY_DIR}}/. Continue?"
    cmds:
      - rm -rf "{{.DEPLOY_DIR}}/yaml" "{{.DEPLOY_DIR}}/json"
      - echo "Cleaned generated files from {{.DEPLOY_DIR}}/"
